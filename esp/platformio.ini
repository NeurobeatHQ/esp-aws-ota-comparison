; ============================================================================
;  ESP32-S3  ·  AWS IoT Core  ·  Modular OTA  (rollback-safe)  POC
;  Pure ESP-IDF 5.3.x   ·   framework = espidf   ·   NO Arduino layer
; ============================================================================
;
;  platform 6.9.0  ->  ESP-IDF 5.3.1  (the branch esp-aws-iot 202406.05-LTS
;  officially supports; see ../README.md for why this combo).
;
;  Firmware variant is selected with build flags so the SAME source produces
;  the demo fixtures:
;     FW_SELFTEST_SHOULD_PASS = 1  -> "vGOOD"  (self-test passes, OTA commits)
;     FW_SELFTEST_SHOULD_PASS = 0  -> "vBAD"   (self-test fails, device rolls back)
;  Defaults live in src/app_config.h behind #ifndef guards, so the fixture
;  script (scripts/build-fixture.sh) overrides them via PLATFORMIO_BUILD_FLAGS
;  without colliding.
; ----------------------------------------------------------------------------

[platformio]
default_envs = feather_s3
src_dir = src

[env]
platform = espressif32@6.9.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
board_build.partitions = partitions.csv
; sdkconfig.defaults is picked up automatically by the espidf builder.
; Certs are embedded as generated C arrays (see embed_certs.cmake), not via
; board_build.embed_txtfiles (unreliable under PlatformIO's espidf builder).

[env:feather_s3]
board = adafruit_feather_esp32s3

; Plain DevKitC-1 (same SoC) — handy if you don't have the Feather wired up.
[env:devkitc_s3]
board = esp32-s3-devkitc-1
