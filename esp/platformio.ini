; ============================================================================
;  ESP32-S3 · AWS IoT OTA — unified, backend-swappable firmware
;  Pure ESP-IDF 5.3.x · framework = espidf · NO Arduino
; ============================================================================
;  ONE codebase, four interchangeable OTA backends. The application (src/app_main.c)
;  uses only src/device_iot.h and is identical for all four — swap on demand:
;
;     pio run -e mqtt     # C: AWS OTA agent, MQTT File Streams, Signer ECDSA verify
;     pio run -e https    # D: AWS OTA agent, HTTPS data path,   Signer ECDSA verify
;     pio run -e jobs     # B: AWS IoT Jobs lib + esp_https_ota  (no on-device verify)
;     pio run -e manual   # A: custom MQTT protocol + esp_https_ota (no AWS libs)
;
;  select_backend.py exports the env name as OTA_BACKEND; CMake links only that
;  backend's transport + orchestrator + component deps (see src/CMakeLists.txt).
;
;  vGOOD/vBAD fixtures via FW_SELFTEST_SHOULD_PASS, as before (scripts/build-fixture.sh).
; ----------------------------------------------------------------------------

[platformio]
default_envs = mqtt
src_dir = src

[env]
platform = espressif32@6.9.0
framework = espidf
board = adafruit_feather_esp32s3
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; monitor_raw = yes
upload_speed = 921600
board_build.partitions = partitions.csv
; The main app is bigger than `factory` and lives in ota_0 — size the build against
; ota_0, not factory (else "program size > maximum allowed"). Flash offset + otadata
; for ota_0 are handled by app_to_ota0.py + scripts/flash-main-app.sh.
board_build.app_partition_name = ota_0
extra_scripts = pre:select_backend.py, post:app_to_ota0.py
; Device identity (cert + key + Thing name) always comes from the esp_secure_cert
; partition — flash it per board with scripts/provision-secure-cert.sh. Only the public
; root CA + code-signing cert are embedded; the device private key is never in the .bin.

[env:mqtt]
[env:https]
[env:jobs]
[env:manual]
