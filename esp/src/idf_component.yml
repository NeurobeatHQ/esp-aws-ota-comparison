## IDF component-manager manifest for the "main" component.
## The aws-iot-core-mqtt-file-streams-embedded-c component REQUIRES `espressif__cbor`
## (its CBOR stream codec is compiled in even though this firmware downloads via
## the JSON stream). The first build fetches it from the registry.
dependencies:
  idf:
    version: ">=5.3"
  espressif/cbor:
    version: ">=0.6.0"
