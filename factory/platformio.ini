; nbt factory / recovery image — PlatformIO, pure ESP-IDF (no Arduino).
; Builds into the `factory` partition. Behavior (see README + design doc §4):
;   boot       -> SoftAP `nbt-factory-ap` + captive portal (SSID, password, URL)
;   on submit  -> join WiFi + HTTP-OTA the signed image -> reboot into it
[env:factory]
; Use a platform release that ships ESP-IDF 5.3.x with framework=espidf.
; Stock espressif32 works; the pioarduino fork is the fallback for recent IDF:
;   platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
platform = espressif32
framework = espidf
board = adafruit_feather_esp32s3
monitor_speed = 115200
monitor_raw = yes
board_build.partitions = partitions.csv
