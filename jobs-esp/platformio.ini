; ============================================================================
;  Variant B — ESP32-S3 · AWS IoT Jobs (esp-mqtt) + esp_https_ota self-download
;  Pure ESP-IDF 5.3.x  ·  framework = espidf  ·  NO Arduino
; ============================================================================
;  Lighter than variant C (../esp): drops coreMQTT + AWS MQTT File Streams +
;  the OTA PAL code-signature check. The standalone AWS IoT Jobs lib rides
;  esp-mqtt; the firmware self-downloads from a presigned S3 URL in the job doc
;  with esp_https_ota. Authenticity = TLS-to-S3 (+ Secure Boot, off on dev).
;
;  Same vGOOD/vBAD variant flags as C (see src/app_config.h).
; ----------------------------------------------------------------------------

[platformio]
default_envs = feather_s3
src_dir = src

[env]
platform = espressif32@6.9.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
board_build.partitions = partitions.csv
; Certs embedded as generated C arrays (see embed_certs.cmake).

[env:feather_s3]
board = adafruit_feather_esp32s3

[env:devkitc_s3]
board = esp32-s3-devkitc-1
